squad:
  code: ghostwriter-linkedin-article
  name: Ghostwriter LinkedIn Article — Luby
  description: >
    Gera artigos LinkedIn longos (1.500-2.000 words) para colaboradores da Luby.
    Fluxo: fetch collaborators do Supabase > match flavor > pesquisa web profunda > persona
    > escrita artigo EN-US (headline, intro, 3-5 seções, conclusão, CTA) > tradução PT-BR
    > review combinada (tech+estrutura) com auto-fix > image prompt guide (Diana, texto)
    > salva em bloggers (Supabase) > envia email para cada collaborator
    via Edge Function > entrega final. Publicação manual pelo collaborator.
  version: "1.0.0"
  created: "2026-04-29"
  performance_mode: alta-performance
  language: multilingual

inputs:
  - name: collaborators
    type: array
    description: "Lista de colaboradores carregados do Supabase (tabela collaborators)"
    required: true
    source: supabase

  - name: flavors
    type: array
    description: "Flavors selecionados automaticamente por match de topics com related_searchs"
    required: true
    source: supabase

supabase:
  url: "https://pbvjsixlqnuzcnqahbxu.supabase.co"
  config: pipeline/data/supabase-config.json
  tables:
    - collaborators
    - bloggers
    - related_searchs

skills:
  - web_search
  - web_fetch

data:
  - pipeline/data/supabase-config.json
  - pipeline/data/smtp-config.json
  - pipeline/data/tone-of-voice.md
  - pipeline/data/quality-criteria.md
  - pipeline/data/sources.json

formats:
  - linkedin-article

pipeline:
  entry: pipeline/pipeline.yaml
  steps:
    - step-00-load-collaborators
    - step-01-research
    - step-02-persona
    - step-03-write
    - step-04-translate
    - step-05-review
    - step-06-image-prompt
    - step-07-save-to-supabase
    - step-08-send-email
    - step-09-delivery
