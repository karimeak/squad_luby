squad:
  code: ghostwriter-linkedin
  name: Ghostwriter LinkedIn — Luby
  description: >
    Gera posts de texto para LinkedIn prontos para publicação, personalizados
    por colaborador da Luby. Input: flavor (tema) + perfil (colaborador) + idioma (EN ou PT-BR).
    Fluxo: pesquisa web → carga de persona → escrita de variantes A/B → seleção →
    revisão técnica → revisão de engajamento → aprovação → geração de imagem (opcional, via Gemini) → entrega em markdown.
  version: "1.0.0"
  created: "2026-03-27"
  performance_mode: alta-performance
  language: multilingual

inputs:
  - name: flavor
    type: string
    description: "Tema/assunto do post — selecionado via menu do Supabase (tabela related_searchs)"
    required: true
    source: supabase

  - name: perfil
    type: string
    description: "Nome do colaborador (Wagner, Maise, Samuel, Marine, Paulo, Gardin)"
    required: true
    options: [Wagner, Maise, Samuel, Marine, Paulo, Gardin]

  - name: idioma
    type: string
    description: "Idioma do post: EN (inglês) ou PT-BR (português)"
    required: true
    options: [EN, PT-BR]

  - name: formato
    type: string
    description: "Formato do conteúdo LinkedIn: Text Post, Carousel, Poll ou Article"
    required: true
    options: [Text, Carousel, Poll, Article]
    default: Text

  - name: tamanho
    type: string
    description: "Tamanho do post: Low (até 700 chars), Medium (700-1500 chars), Large (1500-3000 chars). Aplicável a Text e Poll."
    required: false
    options: [Low, Medium, Large]
    default: Medium

supabase:
  url: "https://pbvjsixlqnuzcnqahbxu.supabase.co"
  config: pipeline/data/supabase-config.json
  table: related_searchs
  query_column: query
  flavor_column: related_search

skills:
  - web_search
  - web_fetch
  - linkedin-content        # .agents/skills/linkedin-content/SKILL.md
  - playwright              # browser automation for Gemini image generation

data:
  - pipeline/data/supabase-config.json
  - pipeline/data/collaborators.json
  - pipeline/data/tone-of-voice.md
  - pipeline/data/quality-criteria.md
  - pipeline/data/sources.json

formats:
  - linkedin-post

pipeline:
  entry: pipeline/pipeline.yaml
  steps:
    - step-00-flavor-picker
    - step-01-research
    - step-02-persona
    - step-03-write
    - step-04-variant-selection
    - step-05-tech-review
    - step-06-engagement-review
    - step-07-final-approval
    - step-08-image-offer
    - step-09-image-generation
    - step-10-delivery
