squad:
  code: blog-luby-local
  name: Blog Writer Local — Luby
  description: >
    Pipeline local de geração de blog posts (1 por channel).
    Gera HTML, salva no Supabase. O envio de email é feito pelo n8n separadamente.
    Acionamento manual via /opensquad run blog-luby-local.
  version: "2.0.0"
  created: "2026-04-07"
  performance_mode: alta-performance
  language: multilingual

supabase:
  url: "https://pbvjsixlqnuzcnqahbxu.supabase.co"
  config: pipeline/data/supabase-config.json
  tables:
    - articles
    - publishers

skills:
  - web_search
  - web_fetch

data:
  - pipeline/data/supabase-config.json
  - pipeline/data/sources.json

pipeline:
  entry: pipeline/pipeline.yaml
  steps:
    - step-00-scout-and-pick
    - step-01-research
    - step-02-write
    - step-03-tech-review
    - step-04-image-search
    - step-05-save-draft
