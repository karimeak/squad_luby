squad:
  code: ghostwriter-linkedin-auto
  name: Ghostwriter LinkedIn Auto — Luby
  description: >
    Versao automatizada do ghostwriter LinkedIn. Gera posts de texto Medium
    para os colaboradores sem interacao humana, respeitando a coluna
    `language` (pt-br, en-us ou ambas) de cada collaborator. Fluxo: fetch
    collaborators do Supabase > match flavor por topicos > pesquisa web >
    persona > escrita EN-US (Bruno) > traducao PT-BR (Bruno, condicional)
    > review tech+engajamento (Helena) > humanizacao separada (Pedro, com
    auto-fix) > selecao de 2 collaborators para video (Lucas, rotacao
    random sem repeticao via tabela video_rotation_linkedin) > geracao de
    video Remotion modo personal (Cleidim, 1 MP4 por collaborator
    selecionado, lingua escolhida pela rotacao bilingue) > image prompt
    guide por lingua (Diana) > geracao via Gemini + upload pro Supabase
    Storage (bucket linkedin-ghostwriter-images) > LinkedIn profile
    optimizer > salva em bloggers (Supabase, com image_url e video_url
    quando aplicavel) > envia email com posts/imagens/video real via Edge
    Function > entrega final.
  version: "1.6.0"
  created: "2026-04-07"
  performance_mode: alta-performance
  language: multilingual

inputs:
  - name: collaborators
    type: array
    description: "Lista de colaboradores carregados do Supabase (tabela collaborators, com coluna language text[])"
    required: true
    source: supabase

  - name: flavors
    type: array
    description: "Flavors selecionados automaticamente por match de topics com related_searchs"
    required: true
    source: supabase

  - name: video_rotation
    type: array
    description: "Historico de rotacao de videos (tabela video_rotation_linkedin) — usado para escolher os 2 collaborators da rodada"
    required: true
    source: supabase

supabase:
  url: "https://pbvjsixlqnuzcnqahbxu.supabase.co"
  config: pipeline/data/supabase-config.json
  tables:
    - collaborators
    - bloggers
    - related_searchs
    - video_rotation_linkedin
  storage:
    - linkedin-ghostwriter-images
    - linkedin-ghostwriter-videos

skills:
  - web_search
  - web_fetch
  - linkedin-content
  - linkedin-profile-optimizer
  - humanizer
  - image-design
  - playwright
  - remotion-best-practices

data:
  - pipeline/data/supabase-config.json
  - pipeline/data/smtp-config.json
  - pipeline/data/tone-of-voice.md
  - pipeline/data/quality-criteria.md
  - pipeline/data/sources.json
  - pipeline/data/video-config.json

formats:
  - linkedin-post
  - linkedin-video

pipeline:
  entry: pipeline/pipeline.yaml
  steps:
    - step-00-load-collaborators
    - step-01-research
    - step-02-persona
    - step-03-write
    - step-04-translate
    - step-05-review
    - step-05b-humanize
    - step-05c-video-selection
    - step-05d-video-generation
    - step-06-image-suggestion
    - step-07-linkedin-optimizer
    - step-08-save-to-supabase
    - step-09-send-email
    - step-10-delivery
